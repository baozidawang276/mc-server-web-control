<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC 服务器控制面板</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .status-text {
            font-size: 16px;
            margin-bottom: 15px;
            color: #555;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-stop {
            background-color: #ff4d4f;
            color: white;
        }
        .player-list {
            color: #555;
            line-height: 1.6;
        }
        .cmd-form {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .cmd-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-send {
            background-color: #4096ff;
            color: white;
        }
        .log-box {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 4px;
            height: 300px;
            overflow-y: auto;
            font-family: Consolas, monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h1>MC 服务器控制面板</h1>

    <!-- 服务器状态控制 -->
    <div class="card">
        <div class="status-text">当前状态: {{ status }}</div>
        {% if running %}
            <form method="post">
                <button type="submit" name="action" value="stop" class="btn btn-stop">关闭服务器</button>
            </form>
        {% else %}
            <form method="post">
                <button type="submit" name="action" value="start" class="btn btn-start">启动服务器</button>
            </form>
        {% endif %}
    </div>

    <!-- 在线玩家 -->
    <div class="card">
        <h3>在线玩家</h3>
        <div class="player-list">{{ player_text }}</div>
    </div>

    <!-- 发送指令 -->
    <div class="card">
        <h3>发送控制台指令</h3>
        <form method="post" class="cmd-form">
            <input type="text" name="cmd" class="cmd-input" placeholder="输入服务器指令...">
            <button type="submit" name="action" value="send" class="btn btn-send">发送</button>
        </form>
    </div>

    <!-- 实时日志 -->
    <div class="card">
        <h3>实时服务器日志</h3>
        <div id="logBox" class="log-box">{{ log_text }}</div>
    </div>

    <script>
        // 每 2 秒自动刷新日志
        function refreshLog() {
            fetch('/')
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const newLog = doc.getElementById('logBox').innerHTML;
                    const logBox = document.getElementById('logBox');
                    logBox.innerHTML = newLog;
                    // 自动滚动到底部
                    logBox.scrollTop = logBox.scrollHeight;
                });
        }
        setInterval(refreshLog, 2000);
    </script>
</body>
</html>
