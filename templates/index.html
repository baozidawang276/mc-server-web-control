<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC 服务器控制面板</title>
<meta http-equiv="refresh" content="3">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Microsoft YaHei", sans-serif;
    }

    body {
        background-color: #ffffff;
        color: #333;
        padding: 40px;
        max-width: 1000px;
        margin: 0 auto;
    }

    h2 {
        font-size: 28px;
        margin-bottom: 30px;
        color: #222;
        border-left: 5px solid #409eff;
        padding-left: 15px;
    }

    .card {
        background: #fafafa;
        border-radius: 12px;
        padding: 25px;
        margin-bottom: 20px;
        border: 1px solid #eee;
    }

    .status-text {
        font-size: 16px;
        margin-bottom: 15px;
    }

    .btn {
        padding: 10px 26px;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
        transition: 0.2s;
        margin-right: 10px;
    }

    .btn-start {
        background-color: #67c23a;
        color: #fff;
    }

    .btn-stop {
        background-color: #f56c6c;
        color: #fff;
    }

    .btn-send {
        background-color: #409eff;
        color: #fff;
    }

    input[type="text"] {
        width: 75%;
        padding: 10px 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
        outline: none;
        transition: 0.2s;
    }

    input[type="text"]:focus {
        border-color: #409eff;
    }

    textarea {
        width: 100%;
        height: 320px;
        margin-top: 10px;
        padding: 15px;
        border: 1px solid #eee;
        border-radius: 8px;
        background: #fdfdfd;
        resize: none;
        font-family: Consolas;
        font-size: 14px;
    }
</style>
</head>
<body>

<h2>MC 服务器控制面板</h2>

<div class="card">
    <div class="status-text">当前状态：{{ status }}</div>
    <form method="post">
        {% if not running %}
            <button class="btn btn-start" name="action" value="start">启动服务器</button>
        {% else %}
            <button class="btn btn-stop" name="action" value="stop">关闭服务器</button>
        {% endif %}
    </form>
</div>

<div class="card">
    <h3>在线玩家</h3>
    <p style="margin-top:10px;">{{ player_text }}</p>
</div>

<div class="card">
    <h3>发送控制台指令</h3>
    <form method="post" style="margin-top:15px;">
        <input type="text" name="cmd" placeholder="输入服务器指令...">
        <button class="btn btn-send" name="action" value="send">发送</button>
    </form>
</div>

<div class="card">
    <h3>实时服务器日志</h3>
    <textarea readonly>{{ log_text }}</textarea>
</div>

</body>
</html>
