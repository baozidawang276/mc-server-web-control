<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MCDR 控制面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 20px;
        }
        h1 {
            margin-bottom: 20px;
            color: #333;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .sidebar {
            width: 380px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: sticky;
            top: 20px;
            height: fit-content;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card h3 {
            margin-bottom: 10px;
            color: #444;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 6px;
        }
        .btn-green {
            background: #52c41a;
            color: white;
        }
        .btn-red {
            background: #ff4d4f;
            color: white;
        }
        .btn-blue {
            background: #1890ff;
            color: white;
        }
        .btn-save {
            width: 100%;
            background: #1890ff;
            color: white;
            margin-top: 10px;
            padding: 10px;
            font-size: 15px;
        }
        input[type="text"] {
            padding: 8px;
            width: 300px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        textarea {
            width: 100%;
            height: 420px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: Consolas, monospace;
            font-size: 13px;
            resize: vertical;
        }
        .log-box {
            height: 400px;
            overflow-y: auto;
            background: #2d2d2d;
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            font-family: Consolas, monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>MCDR 服务器控制面板</h1>

    <div class="container">
        <!-- 左侧配置栏 -->
        <div class="sidebar">
            <h3>server.properties 配置</h3>
            <form method="post">
                <textarea name="config_content">{{ config_content }}</textarea>
                <button type="submit" name="action" value="save_config" class="btn btn-save">
                    保存配置并自动重启服务器
                </button>
            </form>
        </div>

        <!-- 右侧主面板 -->
        <div class="main-content">
            <div class="card">
                <h3>服务器状态：{{ status }}</h3>
                <form method="post" style="display: inline;">
                    <button type="submit" name="action" value="start" class="btn btn-green">启动服务器</button>
                    <button type="submit" name="action" value="stop" class="btn btn-red">停止服务器</button>
                </form>
            </div>

            <div class="card">
                <h3>在线玩家：{{ player_text }}</h3>
            </div>

            <div class="card">
                <h3>发送指令</h3>
                <form method="post" style="display: flex; gap: 8px; align-items: center;">
                    <input type="text" name="cmd" placeholder="输入指令，如 say hello" autocomplete="off">
                    <button type="submit" name="action" value="send" class="btn btn-blue">发送</button>
                </form>
            </div>

            <div class="card">
                <h3>服务器日志</h3>
                <div class="log-box" id="log">{{ log_text }}</div>
            </div>
        </div>
    </div>

    <script>
        // 只刷新日志，不刷新整个页面！配置框不会被清空了
        function refreshLog() {
            fetch("/log")
               .then(res => res.text())
               .then(text => {
                    document.getElementById("log").innerText = text;
                });
        }
        setInterval(refreshLog, 2000);
    </script>
</body>
</html>
